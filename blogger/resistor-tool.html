<!--
  Passive Component Matching Tool — Blogger 삽입용 HTML/CSS/JS

  사용법:
  1. APPS_SCRIPT_URL 에 배포된 웹 앱 URL을 입력
  2. Blogger 글 편집기에서 HTML 모드로 이 파일 내용을 붙여넣기
-->

<style>
  .pcm-tool {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafafa;
  }
  .pcm-tool h3 {
    margin: 0 0 15px;
    color: #333;
    font-size: 18px;
  }
  .pcm-tool textarea {
    width: 100%;
    min-height: 120px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 13px;
    resize: vertical;
    box-sizing: border-box;
  }
  .pcm-tool textarea::placeholder {
    color: #999;
  }
  .pcm-tool .pcm-actions {
    margin: 10px 0;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .pcm-tool button {
    padding: 8px 20px;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .pcm-tool .pcm-search-btn {
    background: #1a73e8;
    color: white;
  }
  .pcm-tool .pcm-search-btn:hover {
    background: #1557b0;
  }
  .pcm-tool .pcm-search-btn:disabled {
    background: #94bef7;
    cursor: not-allowed;
  }
  .pcm-tool .pcm-copy-btn {
    background: #34a853;
    color: white;
  }
  .pcm-tool .pcm-copy-btn:hover {
    background: #2d8f47;
  }
  .pcm-tool .pcm-status {
    font-size: 13px;
    color: #666;
    margin-left: 10px;
  }
  .pcm-tool table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    font-size: 13px;
  }
  .pcm-tool th {
    background: #1a73e8;
    color: white;
    padding: 8px 6px;
    text-align: left;
    font-weight: 500;
    white-space: nowrap;
  }
  .pcm-tool td {
    padding: 6px;
    border-bottom: 1px solid #e0e0e0;
    vertical-align: top;
  }
  .pcm-tool tr:hover td {
    background: #f0f6ff;
  }
  .pcm-tool .pcm-error-row td {
    background: #fce8e6;
    color: #c5221f;
  }
  .pcm-tool .pcm-summary {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
  }
  .pcm-tool .pcm-summary-ok {
    background: #e6f4ea;
    color: #137333;
  }
  .pcm-tool .pcm-summary-warn {
    background: #fef7e0;
    color: #b05a00;
  }
  .pcm-tool .pcm-summary-err {
    background: #fce8e6;
    color: #c5221f;
  }
  .pcm-tool .pcm-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #ccc;
    border-top-color: #1a73e8;
    border-radius: 50%;
    animation: pcm-spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes pcm-spin {
    to { transform: rotate(360deg); }
  }
</style>

<div class="pcm-tool" id="pcm-root">
  <h3>Passive Component Matching Tool</h3>
  <textarea id="pcm-input" placeholder="저항값을 한 줄에 하나씩 입력하세요.&#10;예시:&#10;1k 1005 5%&#10;10k/0603/1%&#10;4.7k_1005_5%&#10;100R 0402 1%&#10;2.2M 1206 5%"></textarea>
  <div class="pcm-actions">
    <button class="pcm-search-btn" id="pcm-search" onclick="pcmSearch()">부품 검색</button>
    <button class="pcm-copy-btn" id="pcm-copy" onclick="pcmCopyMpn()" style="display:none">MPN 복사</button>
    <span class="pcm-status" id="pcm-status"></span>
  </div>
  <div id="pcm-result"></div>
</div>

<script>
(function() {
  'use strict';

  // ─── 설정 ──────────────────────────────────────────────────────────────────
  // Apps Script 배포 후 아래 URL을 교체하세요.
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';

  var lastMpnList = '';

  window.pcmSearch = function() {
    var input = document.getElementById('pcm-input').value.trim();
    if (!input) {
      setStatus('입력값을 입력하세요.', 'err');
      return;
    }

    var btn = document.getElementById('pcm-search');
    btn.disabled = true;
    setStatus('<span class="pcm-spinner"></span>검색 중...', '');
    document.getElementById('pcm-result').innerHTML = '';
    document.getElementById('pcm-copy').style.display = 'none';

    // JSONP 방식 호출
    var callbackName = 'pcmCallback_' + Date.now();
    window[callbackName] = function(data) {
      btn.disabled = false;
      delete window[callbackName];
      removeScript(callbackName);
      handleResult(data);
    };

    var url = APPS_SCRIPT_URL + '?callback=' + callbackName + '&inputs=' + encodeURIComponent(input);
    var script = document.createElement('script');
    script.id = callbackName;
    script.src = url;
    script.onerror = function() {
      btn.disabled = false;
      delete window[callbackName];
      removeScript(callbackName);
      setStatus('서버 연결 실패. URL을 확인하세요.', 'err');
    };
    document.head.appendChild(script);

    // 타임아웃 (30초)
    setTimeout(function() {
      if (window[callbackName]) {
        btn.disabled = false;
        delete window[callbackName];
        removeScript(callbackName);
        setStatus('요청 시간 초과. 다시 시도하세요.', 'err');
      }
    }, 30000);
  };

  function removeScript(id) {
    var el = document.getElementById(id);
    if (el) el.parentNode.removeChild(el);
  }

  function handleResult(data) {
    if (data.error) {
      setStatus(data.error, 'err');
      return;
    }

    var rows = data.rows || [];
    var headers = data.headers || [];
    lastMpnList = data.mpnList || '';

    if (rows.length === 0) {
      setStatus('결과 없음', 'warn');
      return;
    }

    // 테이블 생성
    var html = '<table><thead><tr>';
    for (var h = 0; h < headers.length; h++) {
      html += '<th>' + esc(headers[h]) + '</th>';
    }
    html += '</tr></thead><tbody>';

    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var cls = r.success ? '' : ' class="pcm-error-row"';
      html += '<tr' + cls + '>';
      html += '<td>' + esc(r.original) + '</td>';
      html += '<td>' + esc(r.resistance) + '</td>';
      html += '<td>' + esc(r['package']) + '</td>';
      html += '<td>' + esc(r.tolerance) + '</td>';
      if (r.success) {
        html += '<td>' + esc(r.mpn) + '</td>';
        html += '<td>' + esc(r.description) + '</td>';
      } else {
        html += '<td colspan="2" style="color:#c5221f">' + esc(r.error || '파싱 실패') + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table>';

    // 요약
    var sumCls = data.errorCount === 0 ? 'pcm-summary-ok' : (data.successCount > 0 ? 'pcm-summary-warn' : 'pcm-summary-err');
    html += '<div class="pcm-summary ' + sumCls + '">';
    html += '전체 ' + data.totalCount + '개 중 ' + data.successCount + '개 성공';
    if (data.errorCount > 0) html += ', ' + data.errorCount + '개 실패';
    html += '</div>';

    document.getElementById('pcm-result').innerHTML = html;
    setStatus('', '');

    if (lastMpnList) {
      document.getElementById('pcm-copy').style.display = 'inline-block';
    }
  }

  window.pcmCopyMpn = function() {
    if (!lastMpnList) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(lastMpnList).then(function() {
        setStatus('MPN 목록이 클립보드에 복사되었습니다.', 'ok');
      });
    } else {
      // 폴백
      var ta = document.createElement('textarea');
      ta.value = lastMpnList;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setStatus('MPN 목록이 클립보드에 복사되었습니다.', 'ok');
    }
  };

  function setStatus(msg, type) {
    var el = document.getElementById('pcm-status');
    el.innerHTML = msg;
    el.style.color = type === 'err' ? '#c5221f' : type === 'warn' ? '#b05a00' : type === 'ok' ? '#137333' : '#666';
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
