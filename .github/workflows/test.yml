name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # Tier 1: Mock 테스트 — API 키 불필요, 항상 실행
  test-mock:
    name: Tier 1 - Mock Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  # Tier 2: Live API 테스트 — Secrets에서 키 주입
  test-live:
    name: Tier 2 - Live API Tests
    runs-on: ubuntu-latest
    needs: test-mock  # mock 테스트 통과 후에만 실행
    if: github.event_name == 'push'  # PR에서는 Secrets 접근 불가하므로 push만
    env:
      MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run live tests
        run: npm run test:live
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: tests/reports/
          if-no-files-found: ignore
      - name: Upload failure feedback
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-feedback
          path: tests/feedback/last-failure.json
          if-no-files-found: ignore

  # main 자동 동기화 — Tier 1 통과 후 작업 브랜치를 main에 force push
  # 작업 브랜치는 절대 건드리지 않음 — main에만 커밋
  sync-to-main:
    name: Sync to main
    runs-on: ubuntu-latest
    needs: test-mock
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # 테스트 결과를 파일로 캡처
      - name: Capture test output
        id: test_output
        run: |
          npm test > /tmp/test-output.txt 2>&1 && echo "RESULT=passed" >> $GITHUB_OUTPUT || echo "RESULT=failed" >> $GITHUB_OUTPUT
          cat /tmp/test-output.txt

      # Step 1: 작업 브랜치 내용을 main에 force push
      - name: Force push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:main --force

      # Step 2: main 체크아웃 후 test-report.md만 추가 커밋 (작업 브랜치 불변)
      - name: Commit test-report.md to main only
        run: |
          git fetch origin main
          git checkout main

          mkdir -p docs
          RESULT="${{ steps.test_output.outputs.RESULT }}"
          BADGE="✅ PASSED"
          if [ "$RESULT" = "failed" ]; then BADGE="❌ FAILED"; fi

          cat > docs/test-report.md << 'REPORT_EOF'
          # Test Report
          REPORT_EOF

          cat >> docs/test-report.md << EOF
          - **Date**: $(date -u '+%Y-%m-%d %H:%M UTC')
          - **Branch**: ${{ github.ref_name }}
          - **Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - **Result**: ${BADGE}

          ## Tier 1 Mock Test Output
          \`\`\`
          $(tail -30 /tmp/test-output.txt)
          \`\`\`
          EOF

          git add docs/test-report.md
          git diff --cached --quiet || git commit -m "docs: update test-report [skip ci]"
          git push origin main
