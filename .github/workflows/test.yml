name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # Tier 1: Mock 테스트 — API 키 불필요, 항상 실행
  test-mock:
    name: Tier1 - Mock Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  # Tier 2: Live API 테스트 — Secrets에서 키 주입
  test-live:
    name: Tier 2 - Live API Tests
    runs-on: ubuntu-latest
    needs: test-mock  # mock 테스트 통과 후에만 실행
    if: github.event_name == 'push'  # PR에서는 Secrets 접근 불가능하므로 push만
    permissions:
      contents: write  # 아티팩트 업로드를 위한 쓰기 권한
    env:
      MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      NODE_OPTIONS: --no-warnings  # Node.js Buffer deprecated 경고 억제
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # live 테스트 실행 + 결과 파일 저장
      - name: Run live tests and capture output
        id: live_output
        run: |
          set +e
          npm run test:live > /tmp/live-output.txt 2>&1
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "LIVE_RESULT=passed" >> $GITHUB_OUTPUT
          else
            echo "LIVE_RESULT=failed" >> $GITHUB_OUTPUT
          fi
          # 랜덤 검증 리포트를 /tmp로 복사 (sync-to-main에서 사용)
          mkdir -p /tmp/live-reports
          ls tests/reports/validation-*.md 2>/dev/null && \
            cp tests/reports/validation-*.md /tmp/live-reports/ || true
          cat /tmp/live-output.txt

      # Tier 2 결과를 아티팩트로 저장 (main에 직접 커밋하지 않음 - 충돌 방지)
      - name: Upload Tier 2 results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-live-output
          path: /tmp/live-output.txt
          if-no-files-found: ignore
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: /tmp/live-reports/
          if-no-files-found: ignore
      - name: Upload failure feedback
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-feedback
          path: tests/feedback/last-failure.json
          if-no-files-found: ignore

  # main 자동 동기화 — Tier 1 + Tier 2 결과를 모두 합쳐서 main에 커밋
  # 작업 브랜치는 절대 건드리지 않음 - 충돌 방지
  sync-to-main:
    name: Sync to main
    runs-on: ubuntu-latest
    needs: [test-mock, test-live]  # 두 테스트 모두 완료 후 실행
    if: github.event_name == 'push'  # push 이벤트 때만 실행
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # Tier 2 아티팩트 다운로드
      - name: Download Tier 2 artifact
        uses: actions/download-artifact@v4
        with:
          name: tier2-live-output
          path: /tmp/tier2-artifact/

      # Tier 1 + Tier 2 결과를 합쳐서 test-report.md 생성
      - name: Generate final test-report (Tier 1 + Tier 2)
        env:
          CI_DATE: ${{ github.event.head_commit.timestamp }}
          CI_BRANCH: ${{ github.ref_name }}
          CI_SHA: ${{ github.sha }}
          CI_REPO: ${{ github.repository }}
          CI_TEST_OUTPUT_FILE: /tmp/test-output.txt
          CI_LIVE_OUTPUT_FILE: /tmp/tier2-artifact/live-output.txt
          CI_LIVE_RESULT: ${{ needs.test-live.outputs.result }}
        run: |
          # Tier 1 결과 캡처
          npm test > /tmp/test-output.txt 2>&1
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "RESULT=passed" >> $GITHUB_OUTPUT
          else
            echo "RESULT=failed" >> $GITHUB_OUTPUT
          fi

          # Tier 2 결과 확인
          LIVE_RESULT="unknown"
          if [ -f /tmp/tier2-artifact/live-output.txt ]; then
            # live-output.txt에서 결과 추출
            if grep -q "Total:.*passed.*All systems go" /tmp/tier2-artifact/live-output.txt; then
              LIVE_RESULT="passed"
            else
              LIVE_RESULT="failed"
            fi
          fi

          # Node.js 스크립트로 test-report.md 생성 (Tier 1 + Tier 2 합침)
          node scripts/generate-ci-report.js

          # Tier 2 결과 추가 (append-tier2-report.js 실행)
          node scripts/append-tier2-report.js

          git add docs/test-report.md
          git diff --cached --quiet || git commit -m "docs: update test-report [skip ci]"

      # 작업 브랜치를 main에 force push
      - name: Force push to main
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git push origin HEAD:main --force --no-verify
