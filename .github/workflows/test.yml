name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # Tier 1: Mock 테스트 — API 키 불필요, 항상 실행
  test-mock:
    name: Tier 1 - Mock Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  # Tier 2: Live API 테스트 — Secrets에서 키 주입
  test-live:
    name: Tier 2 - Live API Tests
    runs-on: ubuntu-latest
    needs: test-mock  # mock 테스트 통과 후에만 실행
    if: github.event_name == 'push'  # PR에서는 Secrets 접근 불가하므로 push만
    env:
      MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run live tests
        run: npm run test:live
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: tests/reports/
          if-no-files-found: ignore
      - name: Upload failure feedback
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-feedback
          path: tests/feedback/last-failure.json
          if-no-files-found: ignore

  # main 자동 동기화 — Tier 1 통과 후 작업 브랜치를 main에 force push
  # 작업 브랜치는 절대 건드리지 않음 — main에만 커밋
  sync-to-main:
    name: Sync to main
    runs-on: ubuntu-latest
    needs: test-mock
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # 테스트 결과를 파일로 캡처
      - name: Capture test output
        id: test_output
        run: |
          npm test > /tmp/test-output.txt 2>&1 && echo "RESULT=passed" >> $GITHUB_OUTPUT || echo "RESULT=failed" >> $GITHUB_OUTPUT
          cat /tmp/test-output.txt

      # Step 1: 작업 브랜치 내용을 main에 force push
      - name: Force push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:main --force

      # Step 2: main 체크아웃 후 test-report.md만 추가 커밋 (작업 브랜치 불변)
      - name: Commit test-report.md to main only
        run: |
          git fetch origin main
          git checkout main

          mkdir -p docs
          RESULT="${{ steps.test_output.outputs.RESULT }}"
          BADGE="✅ PASSED"
          if [ "$RESULT" = "failed" ]; then BADGE="❌ FAILED"; fi

          # 최종 출력물 표 + 테스트 결과를 test-report.md에 기록
          cat > docs/test-report.md << 'REPORT_EOF'
# 테스트 결과 리포트

## 최종 출력물 (사용자가 실제로 받아보는 결과)

> 사용자가 저항 값 목록을 붙여넣으면 아래와 같은 6열 테이블이 출력됩니다.

| 입력 원본 | 추출 저항값 | 추출 패키지 | 추출 오차 | 부품명 (MPN) | Description |
|-----------|------------|------------|----------|-------------|-------------|
| `1k 1005 5%` | 1kΩ | 0402 (1005) | 5% | RC0402JR-071KL | RES SMD 1K OHM 5% 1/16W 0402 |
| `10k/0603/1%` | 10kΩ | 0603 (1608) | 1% | RC0603FR-0710KL | RES SMD 10K OHM 1% 1/10W 0603 |
| `100R 0805 5%` | 100Ω | 0805 (2012) | 5% | CRCW0805100RJNEA | RES SMD 100 OHM 5% 1/8W 0805 |
| `4.7k_0402_1%` | 4.7kΩ | 0402 (1005) | 1% | RC0402FR-074K7L | RES SMD 4.7K OHM 1% 1/16W 0402 |
| `2.2M 1206 5%` | 2.2MΩ | 1206 (3216) | 5% | RC1206JR-072M2L | RES SMD 2.2M OHM 5% 1/4W 1206 |
| `칩저항 33옴 0603` | 33Ω | 0603 (1608) | — | RC0603JR-0733RL | RES SMD 33 OHM 5% 1/10W 0603 |

> **부품명만 복사** 버튼을 누르면 MPN 목록만 클립보드에 복사됩니다.

---

REPORT_EOF

          cat >> docs/test-report.md << EOF
- **Date**: $(date -u '+%Y-%m-%d %H:%M UTC')
- **Branch**: ${{ github.ref_name }}
- **Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
- **Result**: ${BADGE}

## Tier 1 Mock Test Output

\`\`\`
$(tail -30 /tmp/test-output.txt)
\`\`\`
EOF

          git add docs/test-report.md
          git diff --cached --quiet || git commit -m "docs: update test-report [skip ci]"
          git push origin main
