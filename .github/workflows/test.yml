name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # Tier 1: Mock 테스트 — API 키 불필요, 항상 실행
  test-mock:
    name: Tier 1 - Mock Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  # Tier 2: Live API 테스트 — Secrets에서 키 로딩
  test-live:
    name: Tier 2 - Live API Tests
    runs-on: ubuntu-latest
    needs: test-mock  # mock 테스트 통과 후에만 실행
    if: github.event_name == 'push'  # PR에서는 Secrets 접근 불가능하므로 push만
    permissions:
      contents: write  # 아티팩트 업로드를 위한 쓰기 권한
      secrets: inherit  # 모든 secrets 상속
    env:
      MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # Live 테스트 실행
      - name: Run live tests
        run: |
          set +e
          npm run test:live > /tmp/live-output.txt 2>&1
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "LIVE_RESULT=passed" >> $GITHUB_OUTPUT
          else
            echo "LIVE_RESULT=failed" >> $GITHUB_OUTPUT
          fi

  # main 자동 동기화 — Tier 1 + Tier 2 결과를 모두 합쳐서 main에 커밋
  sync-to-main:
    name: Sync to main
    runs-on: ubuntu-latest
    needs: [test-mock, test-live]  # 두 테스트 모두 완료 후 실행
    if: github.event_name == 'push'  # push 이벤트 때만 실행
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # .env 파일을 생성하고 로컬 키를 저장
      - name: Setup local .env and keys
        run: |
          mkdir -p secrets

          # .env 파일 생성 (GitHub Secrets에서 읽을 키)
          cat > .env << 'ENVEOF'
          MOUSER_API_KEY=${{ secrets.MOUSER_API_KEY }}
          GLM_API_KEY=${{ secrets.GLM_API_KEY }}
          ENVEOF

          # 앱스 스크립트 키 파일 저장
          echo "MOUSER_API_KEY=${{ secrets.MOUSER_API_KEY }}" > secrets/apps_script_key.txt
          echo "GLM_API_KEY=${{ secrets.GLM_API_KEY }}" >> secrets/apps_script_key.txt
          echo "APPS_SCRIPT_URL=${{ secrets.APPS_SCRIPT_URL }}" >> secrets/apps_script_key.txt

          cat .env

          echo "Local .env and keys created:"
          echo "✅ .env file created with API keys"
          echo "✅ apps_script_key.txt created with Apps Script URL"

      - name: Commit to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "feat: setup local .env and API keys

      # main에 push
      - name: Push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin main
