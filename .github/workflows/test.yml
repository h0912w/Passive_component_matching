name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # Tier 1: Mock 테스트 — API 키 불필요, 항상 실행
  test-mock:
    name: Tier 1 - Mock Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  # Tier 2: Live API 테스트 — Secrets에서 키 주입
  test-live:
    name: Tier 2 - Live API Tests
    runs-on: ubuntu-latest
    needs: test-mock  # mock 테스트 통과 후에만 실행
    if: github.event_name == 'push'  # PR에서는 Secrets 접근 불가하므로 push만
    permissions:
      contents: write  # main 브랜치에 Tier 2 결과 커밋 위한 쓰기 권한
    env:
      MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # live 테스트 실행 + 결과 파일 저장
      - name: Run live tests and capture output
        id: live_output
        run: |
          set +e
          npm run test:live > /tmp/live-output.txt 2>&1
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "LIVE_RESULT=passed" >> $GITHUB_OUTPUT
          else
            echo "LIVE_RESULT=failed" >> $GITHUB_OUTPUT
          fi
          # 랜덤 검증 리포트를 /tmp로 복사 (git checkout 전에 보존)
          mkdir -p /tmp/live-reports
          ls tests/reports/validation-*.md 2>/dev/null && \
            cp tests/reports/validation-*.md /tmp/live-reports/ || true
          cat /tmp/live-output.txt

      # Tier 2 결과를 main의 test-report.md에 추가 커밋
      # sync-to-main이 Tier 1 리포트를 이미 커밋한 후 이 단계가 실행됨
      - name: Append Tier 2 results to test-report.md on main
        if: always()
        env:
          CI_LIVE_OUTPUT_FILE: /tmp/live-output.txt
          CI_LIVE_RESULT: ${{ steps.live_output.outputs.LIVE_RESULT }}
          CI_LIVE_REPORTS_DIR: /tmp/live-reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          node scripts/append-tier2-report.js
          git add docs/test-report.md
          git diff --cached --quiet || git commit -m "docs: add tier2 results to test-report [skip ci]"
          git push origin main || (git pull origin main --rebase && git push origin main)

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: tests/reports/
          if-no-files-found: ignore
      - name: Upload failure feedback
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-feedback
          path: tests/feedback/last-failure.json
          if-no-files-found: ignore

  # main 자동 동기화 — Tier 1 통과 후 작업 브랜치를 main에 force push
  # 작업 브랜치는 절대 건드리지 않음 — main에만 커밋
  sync-to-main:
    name: Sync to main
    runs-on: ubuntu-latest
    needs: test-mock
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # 테스트 결과를 파일로 캡처
      - name: Capture test output
        id: test_output
        run: |
          npm test > /tmp/test-output.txt 2>&1 && echo "RESULT=passed" >> $GITHUB_OUTPUT || echo "RESULT=failed" >> $GITHUB_OUTPUT
          cat /tmp/test-output.txt

      # Step 1: 작업 브랜치 내용을 main에 force push
      - name: Force push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:main --force

      # Step 2: main 체크아웃 후 test-report.md만 추가 커밋 (작업 브랜치 불변)
      - name: Commit test-report.md to main only
        env:
          CI_DATE: ${{ github.event.head_commit.timestamp }}
          CI_BRANCH: ${{ github.ref_name }}
          CI_SHA: ${{ github.sha }}
          CI_REPO: ${{ github.repository }}
          CI_RESULT: ${{ steps.test_output.outputs.RESULT }}
          CI_TEST_OUTPUT_FILE: /tmp/test-output.txt
        run: |
          git fetch origin main
          git checkout main

          # Node.js 스크립트로 test-report.md 생성 (YAML heredoc 특수문자 문제 우회)
          node scripts/generate-ci-report.js

          git add docs/test-report.md
          git diff --cached --quiet || git commit -m "docs: update test-report [skip ci]"
          git push origin main
